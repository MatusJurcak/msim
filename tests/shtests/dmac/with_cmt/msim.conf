add rom flash 0x0
flash generic 4K
flash load "main.bin"

add rwm ram 0xFFFF6000
ram generic 32K

add rwm data 0xF0000000
data generic 4K

add dsh2ecpu cpu0

add dsh2eintc intc0

cpu0 setintc intc0

# CMT
add dsh2ecmt cmt 188 192

intc0 addintsrc 188 0 12
intc0 addintsrc 192 1 11

cpu0 addperipheral cmt
cmt addcpu cpu0

add dsh2edmac dmac 72 74 76 78

# add request source 1 (cmt0) with type 2 (DO_NOT_CARE) to DMAC
dmac addsource 1 2

# DMAC interrupt number channel 0
intc0 addintsrc 72 8 10
# DMAC interrupt number channel 1
intc0 addintsrc 74 8 10
# DMAC interrupt number channel 2
intc0 addintsrc 76 9 10 
# DMAC interrupt number channel 3
intc0 addintsrc 78 9 10

cpu0 addperipheral dmac
dmac addcpu cpu0

# Add DMAC reference to CMT so that CMT can trigger DMAC transfers
cmt adddmac dmac